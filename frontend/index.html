  <style>
    *{scrollbar-width:thin;scrollbar-color:rgba(20,184,166,0.2) transparent}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(20,184,166,0.25);border-radius:4px}
    ::-webkit-scrollbar-thumb:hover{background:rgba(20,184,166,0.45)}

    body{font-family:'Inter',sans-serif;background:#04090f;overflow-x:hidden}

    .sc-bg{
      background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(13,148,136,0.15),transparent),
               radial-gradient(ellipse 60% 40% at 80% 80%,rgba(217,119,6,0.06),transparent),
               #04090f;
    }

    .glass{
      background:rgba(8,22,36,0.75);
      backdrop-filter:blur(20px);
      border:1px solid rgba(20,184,166,0.1);
    }
    .glass-card{
      background:linear-gradient(135deg,rgba(12,30,46,0.6) 0%,rgba(6,16,26,0.8) 100%);
      backdrop-filter:blur(12px);
      border:1px solid rgba(20,184,166,0.08);
      transition:all 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    .glass-card:hover{
      border-color:rgba(20,184,166,0.22);
      transform:translateY(-3px);
      box-shadow:0 20px 40px -12px rgba(0,0,0,0.5),0 0 24px rgba(20,184,166,0.07);
    }
    .glass-input{
      background:rgba(6,16,26,0.7);
      border:1px solid rgba(20,184,166,0.12);
      transition:all 0.3s ease;
      color:#e2e8f0;
    }
    .glass-input:focus{
      background:rgba(6,16,26,0.9);
      border-color:rgba(20,184,166,0.45);
      box-shadow:0 0 0 3px rgba(20,184,166,0.1);
      outline:none;
    }
    .glass-input::placeholder{color:rgba(148,163,184,0.4)}

    .btn-primary{
      background:linear-gradient(135deg,#0d9488 0%,#059669 100%);
      position:relative;overflow:hidden;
      box-shadow:0 4px 20px rgba(13,148,136,0.3);
    }
    .btn-primary::before{
      content:'';position:absolute;top:0;left:-100%;
      width:100%;height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
      transition:left 0.5s;
    }
    .btn-primary:hover::before{left:100%}
    .btn-primary:hover{box-shadow:0 6px 28px rgba(13,148,136,0.45)}

    .btn-gold{
      background:linear-gradient(135deg,#d97706 0%,#b45309 100%);
      box-shadow:0 4px 20px rgba(217,119,6,0.3);
    }
    .btn-gold:hover{box-shadow:0 6px 28px rgba(217,119,6,0.45)}

    .gradient-text{
      background:linear-gradient(135deg,#2dd4bf 0%,#34d399 50%,#fbbf24 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .gold-text{
      background:linear-gradient(135deg,#fbbf24,#f59e0b);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    @keyframes scaleIn{from{opacity:0;transform:scale(0.94)}to{opacity:1;transform:scale(1)}}
    @keyframes pulse-teal{0%,100%{box-shadow:0 0 0 0 rgba(20,184,166,0.4)}50%{box-shadow:0 0 0 8px rgba(20,184,166,0)}}
    @keyframes scanLine{0%{top:0%}50%{top:100%}100%{top:0%}}
    .animate-scan-line{animation:scanLine 2.5s cubic-bezier(0.4,0,0.2,1) infinite}
    .animate-fade-in{animation:fadeIn 0.4s ease-out forwards}  @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes toastIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
    @keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(100%)}}
    @keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    .animate-fade-in{animation:fadeIn 0.5s ease forwards}
    .animate-slide-up{animation:slideUp 0.45s cubic-bezier(0.4,0,0.2,1) forwards}
    .animate-scale-in{animation:scaleIn 0.35s cubic-bezier(0.4,0,0.2,1) forwards}
    .animate-spin{animation:spin 1s linear infinite}
    .animate-toast-in{animation:toastIn 0.35s ease forwards}
    .animate-count{animation:countUp 0.5s ease forwards}

    .sidebar-item-active{
      background:linear-gradient(90deg,rgba(20,184,166,0.18) 0%,rgba(20,184,166,0.05) 100%);
      border-left:3px solid #14b8a6;
      color:#fff;
    }

    .sidebar-item:hover{background:rgba(20,184,166,0.07);color:#fff}

    .status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}

      display:flex;flex-direction:column;align-items:center;
      position:relative;flex:1;

      content:'';position:absolute;top:16px;left:50%;

<body class="text-slate-300 antialiased sc-bg">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, createContext, useContext } = React;

// ─── UTILS ────────────────────────────────────────────────────────────────────
const fmt = (v) => {
  if (!v) return 'N/A';
  try { const d=new Date(v); return isNaN(d.getTime())?'N/A':d.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}); } catch { return 'N/A'; }
};
const fmtDT = (v) => {
  if (!v) return 'N/A';
  try { const d=new Date(v); return isNaN(d.getTime())?'N/A':d.toLocaleString('en-US',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); } catch { return 'N/A'; }
};
const uuidToDate = (tu) => {
  if (!tu) return null;
  try {
    const p=tu.split('-');
    if (p.length<3) return null;
    const t=((parseInt(p[2].substring(1),16)*Math.pow(2,48))+(parseInt(p[1],16)*Math.pow(2,32))+parseInt(p[0],16)-122192928000000000)/10000;
    return new Date(t).toISOString();
  } catch { return null; }
};
const timeSafe = (v) => { if(!v) return 0; const d=new Date(v); return isNaN(d.getTime())?0:d.getTime(); };

// ─── CONFIG ───────────────────────────────────────────────────────────────────
const API_BASE = 'https://exmaple.dev/api'; //To link it with server just put your ngrok 'example.dev'

const STATUS_FLOW = ['MANUFACTURED','SHIPPED_TO_DISTRIBUTOR','RECEIVED_BY_DISTRIBUTOR','SHIPPED_TO_RETAILER','RECEIVED_BY_RETAILER','SOLD_TO_CUSTOMER'];

const STATUS_CFG = {
  MANUFACTURED:           { color:'bg-teal-500',   text:'text-teal-400',   border:'border-teal-500/30',   icon:'factory', label:'Manufactured',             glow:'rgba(20,184,166,0.25)' },
  SHIPPED_TO_DISTRIBUTOR: { color:'bg-amber-500',  text:'text-amber-400',  border:'border-amber-500/30',  icon:'truck',   label:'Shipped to Distributor',   glow:'rgba(245,158,11,0.25)' },
  RECEIVED_BY_DISTRIBUTOR:{ color:'bg-orange-500', text:'text-orange-400', border:'border-orange-500/30', icon:'package', label:'Received by Distributor',  glow:'rgba(249,115,22,0.25)' },
  SHIPPED_TO_RETAILER:    { color:'bg-yellow-500', text:'text-yellow-400', border:'border-yellow-500/30', icon:'truck',   label:'Shipped to Retailer',      glow:'rgba(234,179,8,0.25)'  },
  RECEIVED_BY_RETAILER:   { color:'bg-lime-500',   text:'text-lime-400',   border:'border-lime-500/30',   icon:'store',   label:'Received by Retailer',     glow:'rgba(132,204,22,0.25)' },
  SOLD_TO_CUSTOMER:       { color:'bg-emerald-500',text:'text-emerald-400',border:'border-emerald-500/30',icon:'user',    label:'Sold to Customer',         glow:'rgba(16,185,129,0.25)' },
};

const ROLE_CFG = {
  MANUFACTURER: { label:'Manufacturer', gradient:'from-teal-600 to-emerald-700',   icon:'factory', description:'Create & ship products', allowed:['SHIPPED_TO_DISTRIBUTOR'], color:'teal' },
  DISTRIBUTOR:  { label:'Distributor',  gradient:'from-amber-600 to-orange-700',   icon:'truck',   description:'Receive & forward products', allowed:['RECEIVED_BY_DISTRIBUTOR','SHIPPED_TO_RETAILER'], color:'amber' },
  RETAILER:     { label:'Retailer',     gradient:'from-lime-600 to-green-700',     icon:'store',   description:'Stock & sell to customers', allowed:['RECEIVED_BY_RETAILER','SOLD_TO_CUSTOMER'], color:'lime' },
  CUSTOMER:     { label:'Customer',     gradient:'from-emerald-600 to-teal-700',   icon:'user',    description:'Verify & track purchases', allowed:[], color:'emerald' },
};

// ─── API SERVICE ──────────────────────────────────────────────────────────────
const api = {
  req: async (ep, opts={}) => {
    const token = sessionStorage.getItem('sc_token');
    const res = await fetch(`${API_BASE}${ep}`, {
      ...opts,
      headers: { 
        'Content-Type':'application/json', 
        'ngrok-skip-browser-warning': '1',
        ...(token&&{Authorization:`Bearer ${token}`}), 
        ...opts.headers 
      }
    });
    if (!res.ok) { const e=await res.json().catch(()=>({error:'Request failed'})); throw new Error(e.error||`HTTP ${res.status}`); }
    return res.json();
  },
  login:   (email,pw)  => api.req('/auth/login',   { method:'POST', body:JSON.stringify({email,password:pw}) }),
  signup:  (data)      => api.req('/auth/signup',  { method:'POST', body:JSON.stringify(data) }),
  me:      ()          => api.req('/auth/me'),
  roles:   ()          => api.req('/auth/roles/available'),
  products:()          => api.req('/products'),
  myProducts:(uid)     => api.req(`/products/user/${uid}`),
  product: (id)        => api.req(`/products/${id}`),
  create:  (data)      => api.req('/products',     { method:'POST', body:JSON.stringify(data) }),
  transfer:(id,data)   => api.req(`/products/${id}/transfer`, { method:'POST', body:JSON.stringify(data) }),
  history: (id)        => api.req(`/products/${id}/history`),
  events:  (id)        => api.req(`/products/${id}/events`),
  verify:  (id)        => api.req(`/products/${id}/verify`),
  qrcode:  (id)        => api.req(`/products/${id}/qrcode`),
  iotRead: (id)        => api.req(`/iot/${id}/readings`),
  iotAlerts:(id)       => api.req(`/iot/${id}/alerts`),
  payment: (id)        => api.req(`/products/${id}/payment`),
  payNow:  (id,data)   => api.req(`/products/${id}/payment`, { method:'POST', body:JSON.stringify(data) }),
  benchFull: ()        => api.req('/benchmarks/full'),
  benchTps:  (n)       => api.req('/benchmarks/tps', { method:'POST', body:JSON.stringify({count:n}) }),
  health:  ()          => fetch(`${API_BASE.replace('/api','')}/health`,{headers:{'ngrok-skip-browser-warning':'1'}}).then(r=>r.json()).catch(()=>null),
};

// ─── TOAST CONTEXT ────────────────────────────────────────────────────────────
const ToastCtx = createContext();
const ToastProvider = ({children}) => {
  const [toasts,setToasts] = useState([]);
  const add = (msg,type='success') => {
    const id = Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3800);
  };
  const toast = { success:(m)=>add(m,'success'), error:(m)=>add(m,'error'), warn:(m)=>add(m,'warn'), info:(m)=>add(m,'info') };
  const colors = { success:'border-emerald-500/50 bg-emerald-500/10 text-emerald-300', error:'border-rose-500/50 bg-rose-500/10 text-rose-300', warn:'border-amber-500/50 bg-amber-500/10 text-amber-300', info:'border-teal-500/50 bg-teal-500/10 text-teal-300' };
  const icons  = { success:'✓', error:'✕', warn:'⚠', info:'ℹ' };
  return (
    <ToastCtx.Provider value={toast}>
      {children}
      <div className="fixed top-4 right-4 z-[200] space-y-2 pointer-events-none">
        {toasts.map(t=>(
          <div key={t.id} className={`animate-toast-in flex items-center gap-3 px-4 py-3 rounded-xl border backdrop-blur-xl min-w-[280px] max-w-sm shadow-2xl pointer-events-auto ${colors[t.type]}`}>
            <span className="text-lg font-bold">{icons[t.type]}</span>
            <p className="text-sm font-medium">{t.msg}</p>
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
};
const useToast = () => useContext(ToastCtx);

// ─── AUTH CONTEXT ─────────────────────────────────────────────────────────────
const AuthCtx = createContext();
const AuthProvider = ({children}) => {
  const [user,setUser]   = useState(null);
  const [loading,setLd]  = useState(true);

  useEffect(()=>{
    const token = sessionStorage.getItem('sc_token');
    if (token) {
      api.me().then(r=>setUser(r.user)).catch(()=>sessionStorage.removeItem('sc_token')).finally(()=>setLd(false));
    } else { setLd(false); }
  },[]);

  const login = async (email,pw) => { const r=await api.login(email,pw); sessionStorage.setItem('sc_token',r.token); setUser(r.user); return r.user; };
  const signup = async (data) => { const r=await api.signup(data); sessionStorage.setItem('sc_token',r.token); setUser(r.user); return r.user; };
  const logout = () => { sessionStorage.removeItem('sc_token'); setUser(null); };

  return <AuthCtx.Provider value={{user,login,signup,logout,loading}}>{children}</AuthCtx.Provider>;
};
const useAuth = () => useContext(AuthCtx);

  const c = STATUS_CFG[status]||STATUS_CFG.MANUFACTURED;

  return (
    <span className={`inline-flex items-center gap-1.5 rounded-full font-semibold border ${sz} bg-slate-900/50 ${c.text} ${c.border}`}>
      <I name={c.icon} size={size==='lg'?15:13}/>{c.label}

    primary:'btn-primary text-white',
    gold:'btn-gold text-white',
    secondary:'bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700/50',

// ─── SUPPLY CHAIN PIPELINE ──────────────────────────────────────────────────
const Pipeline = ({currentStatus}) => {
  const ci = STATUS_FLOW.indexOf(currentStatus);
  return (
    <div className="flex items-start gap-0 w-full py-4 px-2">
      {STATUS_FLOW.map((s,i)=>{
        const c = STATUS_CFG[s];
        const done = i<=ci;
        const active = i===ci;
        return (
          <div key={s} className="flex-1 flex flex-col items-center relative">
            {i<STATUS_FLOW.length-1&&(
              <div className="absolute top-4 left-1/2 w-full h-0.5" style={{background:i<ci?'linear-gradient(90deg,#14b8a6,#0d9488)':'rgba(51,65,85,0.3)'}}></div>
            )}
            <div className={`w-8 h-8 rounded-full flex items-center justify-center relative z-10 border-2 transition-all ${active?`${c.color} border-transparent shadow-lg`:`${done?'bg-teal-900/50 border-teal-500/50':'bg-slate-900 border-slate-700'}`}`}
              style={active?{boxShadow:`0 0 16px ${c.glow}`}:{}}>
              <I name={c.icon} size={14} className={active?'text-white':done?'text-teal-400':'text-slate-600'}/>
            </div>
            <p className={`text-[9px] mt-1.5 text-center leading-tight font-medium max-w-[60px] ${active?c.text:done?'text-teal-500/70':'text-slate-700'}`}>
              {c.label}
            </p>
          </div>
        );
      })}
    </div>
  );
};

// ─── PRODUCT TIMELINE ───────────────────────────────────────────────────────
const Timeline = ({history,currentStatus,loading,product}) => {
  const ci = STATUS_FLOW.indexOf(currentStatus);
  
  // Filter and normalize
  const milestones = (history||[]).filter(h => {
    const s = (h.status||h.state||h.event_type||h.eventType||'').toString().trim().toUpperCase();
    return s !== 'IOT_READING' && s !== '';
  });

  // Sort by time (Oldest first)
  const sorted = [...milestones].sort((a,b) => {
    const ta = a.timestamp || a.event_time || '';
    const tb = b.timestamp || b.event_time || '';
    return ta.toString().localeCompare(tb.toString());
  });

  // If loading is finished but we have no milestones, show a default manufactured state using real product data
  if (!loading && sorted.length === 0 && product) {
    sorted.push({ 
      status: 'MANUFACTURED', 
      timestamp: product.created_at || product.createdAt || new Date().toISOString(), 
      location: product.metadata?.location || 'Factory', 
      owner: product.manufacturer_org || product.manufacturer || product.current_owner_org || 'Unknown',
      notes: 'Genesis record' 
    });
  }

  return (
    <div className="relative pl-8 py-2">
      <div className="absolute left-[11px] top-2 bottom-2 w-0.5 rounded-full" style={{background:'linear-gradient(to bottom,#14b8a6,#0d9488,#d97706,#10b981)'}}></div>
      <div className="space-y-5">
        {loading ? (
          <div className="py-10 text-center animate-pulse">
            <I name="loader" className="mx-auto mb-2 text-teal-500 animate-spin" size={24}/>
            <p className="text-xs text-slate-500 uppercase tracking-widest">Loading Journey...</p>
          </div>
        ) : sorted.map((item,idx)=>{
          const val = item.value || item.Value || item;
          let rawSt = item.status || item.state || item.event_type || item.eventType || 
                      val.status || val.state || val.currentStatus || val.current_status;
          
          if(!rawSt && idx === 0) rawSt = 'MANUFACTURED';
          if(!rawSt) return null;

          const st = rawSt.toString().trim().toUpperCase();
          const isActive = STATUS_FLOW.indexOf(st) <= ci;
          const c = STATUS_CFG[st]||STATUS_CFG.MANUFACTURED;
          const ts = item.timestamp || uuidToDate(item.event_time) || val.timestamp || '';
          const owner = item.owner || item.to_org || item.from_org || val.currentOwnerOrg || val.current_owner_org || val.owner || 'Unknown';
          const loc = item.location || val.location || 'N/A';
          const notes = item.notes || val.notes || '';
          const txId = item.txId || item.tx_id || item.fabric_tx_id || val.fabricTxId || val.fabric_tx_id || '';

          return (
            <div key={idx} className="relative animate-slide-up" style={{animationDelay:`${idx*80}ms`}}>
              <div className={`absolute -left-5 top-1 w-3.5 h-3.5 rounded-full border-2 ${isActive?`${c.color} border-transparent`:'bg-slate-900 border-slate-700'} flex items-center justify-center`}>
                {isActive&&<div className="w-1 h-1 rounded-full bg-white"></div>}
              </div>
              <div className={`glass-card rounded-xl p-3.5 ${isActive?'border-l-2 '+c.border:'opacity-30'}`}>
                <div className="flex justify-between items-start mb-1.5">
                  <div className="flex items-center gap-1.5">
                    <I name={c.icon} size={13} className={c.text}/>
                    <span className={`font-semibold text-xs ${isActive?c.text:'text-slate-700'}`}>{c.label}</span>
                  </div>
                  <span className="text-[10px] text-slate-700 font-mono">{fmt(ts)}</span>
                </div>
                <div className="text-xs text-slate-500 space-y-0.5">
                  <p><span className="text-slate-700">Owner:</span> {owner}</p>
                  <p><span className="text-slate-700">Location:</span> {loc}</p>
                  {notes&&<p className="text-slate-700 italic text-[10px] bg-slate-900/40 p-1.5 rounded-lg mt-1">"{notes}"</p>}
                </div>
                {txId&&<div className="mt-2 text-[9px] font-mono text-slate-800 truncate">{txId}</div>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm animate-fade-in" onClick={onClose}>
      <div className="glass rounded-2xl w-full max-w-md animate-scale-in" onClick={e=>e.stopPropagation()}>

          </div>
          <div className="grid grid-cols-2 gap-2">
            {[{l:'Email',v:user.email},{l:'Phone',v:user.phone},{l:'CNIC',v:user.cnic},{l:'Role',v:role.label}].map((x,i)=>(
              <div key={i} className="glass-card rounded-xl p-3">
                <p className="text-[10px] text-slate-600 uppercase mb-0.5">{x.l}</p>
                <p className="text-xs text-white font-medium truncate">{x.v||'N/A'}</p>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── TRANSFER MODAL ─────────────────────────────────────────────────────────
const TransferModal = ({product,userRole,onClose,onSuccess}) => {
  const {user} = useAuth();
  const toast = useToast();
  const [loading,setLd] = useState(false);
  const [fd,setFd] = useState({newOwner:'',toUserId:'',newStatus:'',location:product.metadata?.location||'',price:'',notes:''});
  const cs = product.current_status||product.currentStatus||'MANUFACTURED';
  const rc = ROLE_CFG[userRole]||ROLE_CFG.MANUFACTURER;
  const valid = rc.allowed.filter(s=>STATUS_FLOW.indexOf(s)>STATUS_FLOW.indexOf(cs));
  
  const isAccept = fd.newStatus?.startsWith('RECEIVED_BY');

  useEffect(()=>{if(valid.length>0&&!fd.newStatus) setFd(p=>({...p,newStatus:valid[0]}));},[]);
  
  useEffect(()=>{
    if(isAccept && user){
      setFd(p=>({...p, newOwner: user.org_name||'', toUserId: user.userId||user.user_id||''}));
    }
  }, [fd.newStatus, user]);

  const submit = async(e)=>{
    e.preventDefault(); setLd(true);
    try {
      const r = await api.transfer(product.product_id||product.productId,fd);
      if(r.success){toast.success(isAccept?'Product accepted!':'Transfer successful!');onSuccess?.(r.product);}
      else toast.error(r.message||'Transfer failed');
    } catch(err){toast.error(err.message);} finally{setLd(false);}
  };

  return (
    <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm animate-fade-in" onClick={onClose}>
      <div className="glass rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto animate-scale-in" onClick={e=>e.stopPropagation()}>
        <div className="p-5 border-b border-white/5 flex justify-between items-center">
          <div>
            <h2 className="text-lg font-display font-bold text-white">Transfer Product</h2>
            <p className="text-xs text-slate-500 mt-0.5">{product.name}</p>
          </div>
          <button onClick={onClose} className="text-slate-500 hover:text-white"><I name="x" size={18}/></button>
        </div>
        <form onSubmit={submit} className="p-5 space-y-3">
          {!isAccept && (
            <div className="grid grid-cols-2 gap-3 animate-slide-up">
              <Inp label="New Owner" icon="building" value={fd.newOwner} onChange={e=>setFd({...fd,newOwner:e.target.value})} placeholder="Organization name" required/>
              <Inp label="Recipient User ID" icon="user" value={fd.toUserId} onChange={e=>setFd({...fd,toUserId:e.target.value})} placeholder="UUID" required/>
            </div>
          )}
          <Sel label="Status Change" icon="transfer" value={fd.newStatus} onChange={e=>setFd({...fd,newStatus:e.target.value})} options={valid.map(s=>({value:s,label:STATUS_CFG[s].label}))} required/>
          <Inp label="Location" icon="mapPin" value={fd.location} onChange={e=>setFd({...fd,location:e.target.value})} required/>
          {!isAccept && (
            <div className="animate-slide-up">
              <Inp label="Price / Markup ($)" type="number" icon="dollar" value={fd.price} onChange={e=>setFd({...fd,price:e.target.value})} placeholder="e.g. 500" />
            </div>
          )}
          <div className="space-y-1.5">
            <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Notes</label>
            <textarea value={fd.notes} onChange={e=>setFd({...fd,notes:e.target.value})} rows={2}
              className="w-full glass-input rounded-xl px-4 py-2.5 text-sm resize-none" placeholder={isAccept?'Acceptance notes...':'Transfer notes...'}/>
          </div>
          <div className="flex gap-3 pt-1">
            <Btn type="button" variant="secondary" onClick={onClose} className="flex-1">Cancel</Btn>
            <Btn type="submit" loading={loading} className="flex-1">{isAccept?'Accept Product':'Ship Product'}</Btn>
          </div>
        </form>
      </div>
    </div>
  );
};

// ─── PRODUCT DETAIL MODAL ───────────────────────────────────────────────────
const DetailModal = ({product,userRole,onClose,onUpdate}) => {
  const toast = useToast();
  const [tab,setTab] = useState('timeline');
  const [showTransfer,setShowTransfer] = useState(false);
  const [events,setEvents] = useState([]);
  const [evLd,setEvLd] = useState(false);
  const [localHist,setLocalHist] = useState(product.history||[]);
  const [timeLd,setTimeLd] = useState(false);
  const [qr,setQr] = useState(null);
  const [qrLd,setQrLd] = useState(false);
  const [iot,setIot] = useState([]);
  const [iotAlerts,setIotAlerts] = useState([]);
  const [iotLd,setIotLd] = useState(false);
  const [pay,setPay] = useState(null);
  const [payLd,setPayLd] = useState(false);

  const cs = product.current_status||product.currentStatus||'MANUFACTURED';
  const pid = (product.product_id||product.productId||'').toString();
  const rc = ROLE_CFG[userRole]||ROLE_CFG.MANUFACTURER;
  const canTransfer = rc.allowed.some(s=>STATUS_FLOW.indexOf(s)>STATUS_FLOW.indexOf(cs));

  const tabs = [
    {id:'timeline',label:'Timeline',icon:'history'},
    {id:'details',label:'Details',icon:'box'},
    {id:'qr',label:'QR Code',icon:'qr'},
    {id:'iot',label:'IoT',icon:'wifi'},
    {id:'payment',label:'Payment',icon:'dollar'},
    {id:'events',label:'Events',icon:'clock'},
  ];

  // Load timeline from events API
  useEffect(()=>{
    if(tab==='timeline'&&pid){
      setTimeLd(true);
      api.events(pid).then(r=>{
        if(r.success && r.events){
          setLocalHist(r.events.map(e => ({
            ...e,
            status: e.event_type || e.eventType || e.status || 'STATUS_UNKNOWN',
            timestamp: uuidToDate(e.event_time) || e.timestamp || new Date().toISOString(),
            location: e.location || 'Unknown',
            owner: e.to_org || e.from_org || 'Unknown',
            notes: e.notes || '',
            txId: e.fabric_tx_id || e.txId || e.fabricTxId
          })));
        }
      }).catch(e=>console.error('Timeline fetch error:', e)).finally(()=>setTimeLd(false));
    }
  },[tab,pid]);

  // Load events tab
  useEffect(()=>{
    if(tab==='events'&&pid){
      setEvLd(true);
      api.events(pid).then(r=>setEvents(r.success&&r.events?r.events:[])).catch(()=>setEvents([])).finally(()=>setEvLd(false));
    }
  },[tab,pid]);

  // Load QR code
  useEffect(()=>{
    if(tab==='qr'&&pid&&!qr){
      setQrLd(true);
      api.qrcode(pid).then(r=>{if(r.success)setQr(r);}).catch(()=>{}).finally(()=>setQrLd(false));
    }
  },[tab,pid]);

  // Load IoT data
  useEffect(()=>{
    if(tab==='iot'&&pid){
      setIotLd(true);
      Promise.all([api.iotRead(pid).catch(()=>({readings:[]})),api.iotAlerts(pid).catch(()=>({alerts:[]}))])
        .then(([rd,al])=>{setIot(rd.readings||[]);setIotAlerts(al.alerts||[]);})
        .finally(()=>setIotLd(false));
    }
  },[tab,pid]);

  // Load payment
  useEffect(()=>{
    if(tab==='payment'&&pid){
      setPayLd(true);
      api.payment(pid).then(r=>setPay(r)).catch(()=>setPay(null)).finally(()=>setPayLd(false));
    }
  },[tab,pid]);

  return (
    <>
      <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm animate-fade-in" onClick={onClose}>
        <div className="glass rounded-2xl w-full max-w-3xl max-h-[90vh] overflow-hidden animate-scale-in flex flex-col" onClick={e=>e.stopPropagation()}>
          {/* Header */}
          <div className="p-4 sm:p-5 border-b border-white/5 flex-shrink-0">
            <div className="flex flex-col sm:flex-row justify-between items-start gap-4 mb-4">
              <div className="min-w-0">
                <div className="flex flex-wrap items-center gap-2.5 mb-1">
                  <h2 className="text-xl font-display font-bold text-white truncate">{product.name}</h2>
                  <StatusBadge status={cs} size="lg"/>
                </div>
                <p className="text-slate-600 font-mono text-[10px] sm:text-xs break-all">{pid}</p>
              </div>
              <div className="flex items-center gap-2 w-full sm:w-auto">
                {canTransfer&&<Btn onClick={()=>setShowTransfer(true)} icon={<I name="transfer" size={14}/>} variant="secondary" className="flex-1 sm:flex-none text-xs px-3 py-2">Transfer</Btn>}
                <button onClick={onClose} className="p-2 hover:bg-white/5 rounded-lg text-slate-500 hover:text-white transition-colors shrink-0"><I name="x" size={18}/></button>
              </div>
            </div>
            <Pipeline currentStatus={cs}/>
            <div className="grid grid-cols-3 gap-2 mt-2">
              {[{l:'Manufacturer',v:product.manufacturer||product.manufacturer_org},{l:'Owner',v:product.current_owner_org||product.currentOwner},{l:'Category',v:product.category}].map((x,i)=>(
                <div key={i} className="bg-slate-900/40 rounded-lg p-2.5">
                  <p className="text-[10px] text-slate-600 mb-0.5">{x.l}</p>
                  <p className="text-xs font-medium text-slate-300 truncate">{x.v||'N/A'}</p>
                </div>
              ))}
            </div>
          </div>

          {/* Tabs */}
          <div className="flex overflow-x-auto custom-scrollbar border-b border-white/5 px-2 flex-shrink-0">
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)}
                className={`tab-btn flex items-center gap-1.5 whitespace-nowrap ${tab===t.id?'active':''}`}>
                <I name={t.icon} size={13}/>{t.label}
              </button>
            ))}
          </div>

          {/* Tab Content */}
          <div className="p-5 overflow-y-auto flex-1 custom-scrollbar min-h-0">
            {tab==='timeline' && (
            <div className="pr-2">
              <Timeline history={localHist} currentStatus={cs} loading={timeLd} product={product}/>
            </div>
          )}
          
          {tab==='sensors' && (
            <div className="space-y-4 animate-fade-in">
              <div className="flex items-center justify-between">
                <h4 className="text-sm font-bold text-white uppercase tracking-widest">IoT Sensor Logs</h4>
                <span className="text-[10px] text-teal-400 font-mono bg-teal-500/10 px-2 py-0.5 rounded-full">Live Feed</span>
              </div>
              <div className="max-h-[400px] overflow-y-auto pr-2 custom-scrollbar space-y-2">
                {localHist.filter(h => h.status==='IOT_READING').length === 0 ? (
                  <div className="text-center py-10 text-slate-600 text-xs">No sensor data available for this product.</div>
                ) : (
                  localHist.filter(h => h.status==='IOT_READING').map((h,i)=>(
                    <div key={i} className="glass-card p-3 rounded-xl flex items-center justify-between border-white/5">
                      <div className="flex items-center gap-3">
                        <div className="p-2 rounded-lg bg-teal-500/10"><I name="thermometer" size={14} className="text-teal-400"/></div>
                        <div>
                          <p className="text-xs font-bold text-white">{h.notes || 'Normal Reading'}</p>
                          <p className="text-[9px] text-slate-500 uppercase">{new Date(h.timestamp).toLocaleString()}</p>
                        </div>
                      </div>
                      <div className="text-right">
                        <p className="text-xs font-mono text-teal-400">{h.location}</p>
                        <p className="text-[9px] text-slate-600 uppercase">Gateway verified</p>
                      </div>
                    </div>
                  ))
                )}
              </div>
            </div>
          )}

            {tab==='details'&&(
              <div className="space-y-3 animate-slide-up">
                <div className="grid grid-cols-2 gap-3">
                  {Object.entries(product.metadata||{}).map(([k,v])=>(
                    <div key={k} className="glass-card rounded-xl p-3">
                      <p className="text-[10px] text-slate-600 uppercase tracking-wider mb-0.5">{k}</p>
                      <p className="text-sm font-semibold text-white">{v}</p>
                    </div>
                  ))}
                </div>
                <div className="glass-card rounded-xl p-3">
                  <p className="text-[10px] text-slate-600 mb-1.5">Blockchain Transaction</p>
                  <div className="flex items-center gap-2 text-[10px] font-mono text-slate-600 bg-slate-900/50 p-2 rounded-lg break-all">
                    <I name="shield" size={12}/>{product.fabric_tx_id||product.fabricTxId}
                  </div>
                </div>
              </div>
            )}

            {tab==='qr'&&(
              <div className="text-center animate-slide-up">
                {qrLd?<I name="loader" size={32} className="text-slate-500 mx-auto"/>:qr?(
                  <div className="space-y-4">
                    <div className="inline-block p-4 bg-white rounded-2xl shadow-2xl shadow-teal-500/10">
                      <img src={qr.qrDataUrl} alt="QR Code" className="w-48 h-48"/>
                    </div>
                    <div className="glass-card rounded-xl p-4 max-w-sm mx-auto text-left">
                      <p className="text-xs text-slate-400 mb-2">Scan to verify product authenticity</p>
                      <div className="text-[10px] font-mono text-teal-400 bg-slate-900/50 p-2 rounded-lg break-all">{qr.verifyUrl}</div>
                    </div>
                    <p className="text-[10px] text-slate-600">Product: {qr.name} • ID: {qr.productId?.substring(0,8)}...</p>
                  </div>
                ):<p className="text-slate-500 py-8">QR code unavailable</p>}
              </div>
            )}

            {tab==='iot'&&(
              <div className="space-y-4 animate-slide-up">
                {iotLd?<div className="text-center py-8"><I name="loader" size={24} className="text-slate-500"/></div>:(
                  <>
                    {iotAlerts.length>0&&(
                      <div>
                        <h4 className="text-xs font-semibold text-amber-400 mb-2 flex items-center gap-1.5"><I name="bell" size={14}/>Alerts ({iotAlerts.length})</h4>
                        <div className="space-y-2">
                          {iotAlerts.slice(0,5).map((a,i)=>(
                            <div key={i} className="glass-card rounded-xl p-3 border-l-2 border-amber-500/50">
                              <div className="flex justify-between items-start">
                                <div>
                                  <p className="text-xs font-medium text-amber-300">Threshold Alert</p>
                                  <p className="text-[10px] text-slate-500 mt-0.5">{a.alert || `Temp: ${a.temperature}°C, Hum: ${a.humidity}%`}</p>
                                </div>
                                <span className="text-[9px] text-slate-600">{fmtDT(a.timestamp)}</span>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                    <div>
                      <h4 className="text-xs font-semibold text-teal-400 mb-2 flex items-center gap-1.5"><I name="activity" size={14}/>Sensor Readings ({iot.length})</h4>
                      {iot.length===0?<p className="text-xs text-slate-600 py-4 text-center">No sensor readings recorded</p>:(
                        <div className="space-y-2">
                          {iot.slice(0,10).map((r,i)=>(
                            <div key={i} className="glass-card rounded-xl p-3 flex items-center gap-3">
                              <div className="flex gap-3 flex-1">
                                <div className="flex items-center gap-1.5">
                                  <I name="thermo" size={13} className="text-rose-400"/>
                                  <span className="text-xs text-white font-mono">{r.temperature}°C</span>
                                </div>
                                <div className="flex items-center gap-1.5">
                                  <I name="droplets" size={13} className="text-sky-400"/>
                                  <span className="text-xs text-white font-mono">{r.humidity}%</span>
                                </div>
                                <div className="flex items-center gap-1.5">
                                  <I name="mapPin" size={13} className="text-teal-400"/>
                                  <span className="text-xs text-slate-400">{r.location}</span>
                                </div>
                              </div>
                              <span className="text-[9px] text-slate-600 font-mono">{fmtDT(r.timestamp)}</span>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </>
                )}
              </div>
            )}

            {tab==='payment'&&(
              <div className="animate-slide-up">
                {payLd?<div className="text-center py-8"><I name="loader" size={24} className="text-slate-500"/></div>:
                pay&&pay.paid?(
                  <div className="text-center space-y-4">
                    <div className="inline-flex p-4 bg-emerald-500/15 rounded-full">
                      <I name="check" size={32} className="text-emerald-400"/>
                    </div>
                    <div>
                      <h3 className="text-lg font-display font-bold text-white">Payment Completed</h3>
                      <p className="text-sm text-slate-400 mt-1">This product has been paid for</p>
                    </div>
                    <div className="glass-card rounded-xl p-4 max-w-sm mx-auto text-left space-y-2">
                      {[{l:'Amount',v:`${pay.payment?.currency} ${pay.payment?.amount?.toLocaleString()}`},
                        {l:'Reference',v:pay.payment?.paymentRef},
                        {l:'Buyer',v:pay.payment?.buyer},
                        {l:'Date',v:fmtDT(pay.payment?.timestamp)},
                        {l:'Status',v:pay.payment?.status}
                      ].map((x,i)=>(
                        <div key={i} className="flex justify-between">
                          <span className="text-[10px] text-slate-600">{x.l}</span>
                          <span className="text-xs text-white font-medium">{x.v||'N/A'}</span>
                        </div>
                      ))}
                      <div className="pt-2 border-t border-white/5">
                        <p className="text-[9px] text-slate-700 font-mono break-all">{pay.payment?.txId}</p>
                      </div>
                    </div>
                  </div>
                ):userRole==='CUSTOMER'?(
                  <div className="max-w-sm mx-auto">
                    <div className="text-center mb-5">
                      <div className="inline-flex p-3 bg-teal-500/15 rounded-full mb-3"><I name="dollar" size={24} className="text-teal-400"/></div>
                      <h3 className="text-lg font-display font-bold text-white">Pending Payment</h3>
                      <p className="text-2xl font-bold text-teal-400 mt-2">${product.metadata?.price || '0.00'}</p>
                    </div>
                    <form onSubmit={async(e)=>{
                      e.preventDefault(); setPayLd(true);
                      try { await api.payNow(pid, {amount:product.metadata?.price||0, currency:'USD'}); toast.success('Payment successful!'); setPay({paid:true, payment:{currency:'USD',amount:product.metadata?.price||0,paymentRef:'CC-'+Date.now(),buyer:userRole,timestamp:new Date().toISOString(),status:'COMPLETED'}}); }
                      catch(err){toast.error(err.message);} finally{setPayLd(false);}
                    }} className="glass-card rounded-xl p-5 space-y-4">
                      <div className="space-y-1.5">
                        <label className="text-[10px] text-slate-400 font-semibold uppercase">Card Number</label>
                        <div className="flex items-center glass-input rounded-lg px-3 py-2 text-sm"><I name="creditCard" size={16} className="text-slate-500 mr-2"/><input type="text" className="bg-transparent border-none outline-none w-full text-white font-mono placeholder-slate-600" placeholder="0000 0000 0000 0000" maxLength="19" required/></div>
                      </div>
                      <div className="grid grid-cols-2 gap-3">
                        <div className="space-y-1.5">
                          <label className="text-[10px] text-slate-400 font-semibold uppercase">Expiry Date</label>
                          <input type="text" className="w-full glass-input rounded-lg px-3 py-2 text-sm font-mono text-white placeholder-slate-600" placeholder="MM/YY" maxLength="5" required/>
                        </div>
                        <div className="space-y-1.5">
                          <label className="text-[10px] text-slate-400 font-semibold uppercase">CVC / CVV</label>
                          <input type="password" className="w-full glass-input rounded-lg px-3 py-2 text-sm font-mono text-white placeholder-slate-600" placeholder="•••" maxLength="4" required/>
                        </div>
                      </div>
                      <Btn type="submit" className="w-full mt-2">Pay Now</Btn>
                    </form>
                  </div>
                ):(
                  <div className="text-center py-8">
                    <div className="inline-flex p-4 bg-slate-800 rounded-full mb-3">
                      <I name="dollar" size={28} className="text-slate-500"/>
                    </div>
                    <p className="text-sm text-slate-400">{cs==='SOLD_TO_CUSTOMER'?'Payment pending':'Payment available after sale'}</p>
                    {product.metadata?.price && <p className="text-lg font-bold text-teal-400 mt-2">Current Price: ${product.metadata.price}</p>}
                  </div>
                )}
              </div>
            )}

            {tab==='events'&&(
              <div className="space-y-2 animate-slide-up">
                {evLd?<div className="text-center py-8"><I name="loader" size={24} className="text-slate-500"/></div>:
                events.length===0?<p className="text-center text-slate-600 py-8 text-sm">No events recorded</p>:(
                  events.map((ev,i)=>(
                    <div key={i} className="glass-card rounded-xl p-3 flex items-start gap-2.5">
                      <div className="p-1.5 rounded-lg bg-teal-500/15 text-teal-400 mt-0.5"><I name="clock" size={13}/></div>
                      <div className="flex-1 min-w-0">
                        <p className="text-xs font-medium text-white">{ev.event_type||'Event'}</p>
                        <p className="text-[10px] text-slate-500 mt-0.5">{ev.notes||''}</p>
                        <div className="flex items-center gap-2 mt-1 text-[9px] text-slate-700">
                          <span>{fmtDT(uuidToDate(ev.event_time))}</span>
                          {ev.fabric_tx_id&&<span className="font-mono truncate">{ev.fabric_tx_id}</span>}
                        </div>
                      </div>
                    </div>
                  ))
                )}
              </div>
            )}
          </div>
        </div>
      </div>

      {showTransfer&&(
        <TransferModal product={product} userRole={userRole}
          onClose={()=>setShowTransfer(false)}
          onSuccess={(u)=>{onUpdate(u);setShowTransfer(false);}}/>
      )}
    </>
  );
};

// ─── LOGIN PAGE ─────────────────────────────────────────────────────────────
const LoginPage = ({onSwitch}) => {
  const {login} = useAuth();
  const toast = useToast();
  const [form,setForm] = useState({email:'',password:''});
  const [loading,setLd] = useState(false);
  const [error,setError] = useState('');

  const submit = async(e) => {
    e.preventDefault(); setLd(true); setError('');
    try { await login(form.email,form.password); toast.success('Welcome back!'); }
    catch(err) { setError(err.message); }
    finally { setLd(false); }
  };

  return (
    <div className="min-h-screen flex items-center justify-center bg-grid p-4 sc-bg">
      <div className="w-full max-w-md animate-scale-in">
        <div className="text-center mb-8">
          <div className="inline-flex p-4 bg-gradient-to-br from-teal-500 to-emerald-600 rounded-2xl mb-4 shadow-2xl shadow-teal-500/25">
            <I name="shield" size={32} className="text-white"/>
          </div>
          <h1 className="font-display text-3xl font-bold text-white mb-2">Welcome Back</h1>
          <p className="text-slate-500 text-sm">Sign in to your supply chain account</p>
        </div>
        <form onSubmit={submit} className="glass rounded-2xl p-7 space-y-5">
          {error&&(

// ─── SIGNUP PAGE ────────────────────────────────────────────────────────────
const SignupPage = ({onSwitch}) => {
  const {signup} = useAuth();
  const toast = useToast();
  const [step,setStep] = useState(1);
  const [role,setRole] = useState('MANUFACTURER');
  const [loading,setLd] = useState(false);
  const [error,setError] = useState('');
  const [form,setForm] = useState({
    email:'',password:'',full_name:'',phone:'',cnic:'',
    company_name:'',factory_address:'',product_categories:'',employee_count:'',website:'',established_year:'',
    warehouse_address:'',coverage_areas:'',fleet_size:'',storage_capacity:'',
    store_name:'',store_address:'',store_type:'',store_size:'',license_number:'',opening_hours:'',
    delivery_address:'',date_of_birth:'',gender:''
  });

  const roles = Object.entries(ROLE_CFG).map(([id,cfg])=>({id,...cfg}));

  const goStep3 = () => {
    if(!form.email||!form.password||!form.full_name||!form.phone||!form.cnic){setError('All fields required');return;}
    if(form.password.length<6){setError('Password min 6 chars');return;}
    setError(''); setStep(3);
  };

  const submit = async(e) => {
    e.preventDefault(); setLd(true); setError('');
    const payload = {email:form.email,password:form.password,full_name:form.full_name,phone:form.phone,cnic:form.cnic,role,
      ...(role==='MANUFACTURER'&&{company_name:form.company_name,factory_address:form.factory_address,product_categories:form.product_categories,employee_count:form.employee_count,website:form.website,established_year:form.established_year}),
      ...(role==='DISTRIBUTOR'&&{company_name:form.company_name,warehouse_address:form.warehouse_address,coverage_areas:form.coverage_areas,fleet_size:form.fleet_size,storage_capacity:form.storage_capacity}),
      ...(role==='RETAILER'&&{store_name:form.store_name,store_address:form.store_address,store_type:form.store_type,store_size:form.store_size,license_number:form.license_number,opening_hours:form.opening_hours}),
      ...(role==='CUSTOMER'&&{delivery_address:form.delivery_address,date_of_birth:form.date_of_birth,gender:form.gender}),
    };
    try { await signup(payload); toast.success('Account created!'); }
    catch(err) { setError(err.message); setLd(false); }
  };

  const roleFields = () => {
    switch(role){
      case 'MANUFACTURER': return (<>
        <Inp label="Company Name" icon="building" value={form.company_name} onChange={e=>setForm({...form,company_name:e.target.value})} required/>
        <Inp label="Factory Address" icon="mapPin" value={form.factory_address} onChange={e=>setForm({...form,factory_address:e.target.value})} required/>
        <div className="grid grid-cols-2 gap-3">
          <Inp label="Product Categories" icon="box" value={form.product_categories} onChange={e=>setForm({...form,product_categories:e.target.value})} placeholder="Electronics"/>
          <Inp label="Employees" icon="user" value={form.employee_count} onChange={e=>setForm({...form,employee_count:e.target.value})} placeholder="50-100"/>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <Inp label="Website" icon="globe" value={form.website} onChange={e=>setForm({...form,website:e.target.value})}/>
          <Inp label="Est. Year" icon="clock" value={form.established_year} onChange={e=>setForm({...form,established_year:e.target.value})} placeholder="2010"/>
        </div>
      </>);
      case 'DISTRIBUTOR': return (<>
        <Inp label="Company Name" icon="building" value={form.company_name} onChange={e=>setForm({...form,company_name:e.target.value})} required/>
        <Inp label="Warehouse Address" icon="mapPin" value={form.warehouse_address} onChange={e=>setForm({...form,warehouse_address:e.target.value})} required/>
        <Inp label="Coverage Areas" icon="globe" value={form.coverage_areas} onChange={e=>setForm({...form,coverage_areas:e.target.value})} placeholder="Karachi, Lahore"/>
        <div className="grid grid-cols-2 gap-3">
          <Inp label="Fleet Size" icon="truck" value={form.fleet_size} onChange={e=>setForm({...form,fleet_size:e.target.value})}/>
          <Inp label="Storage" icon="box" value={form.storage_capacity} onChange={e=>setForm({...form,storage_capacity:e.target.value})}/>
        </div>
      </>);
      case 'RETAILER': return (<>
        <Inp label="Store Name" icon="store" value={form.store_name} onChange={e=>setForm({...form,store_name:e.target.value})} required/>
        <Inp label="Store Address" icon="mapPin" value={form.store_address} onChange={e=>setForm({...form,store_address:e.target.value})} required/>
        <div className="grid grid-cols-2 gap-3">
          <Inp label="Store Type" icon="building" value={form.store_type} onChange={e=>setForm({...form,store_type:e.target.value})} placeholder="Electronics"/>
          <Inp label="Store Size" icon="box" value={form.store_size} onChange={e=>setForm({...form,store_size:e.target.value})}/>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <Inp label="License #" icon="idCard" value={form.license_number} onChange={e=>setForm({...form,license_number:e.target.value})}/>
          <Inp label="Hours" icon="clock" value={form.opening_hours} onChange={e=>setForm({...form,opening_hours:e.target.value})} placeholder="9AM-9PM"/>
        </div>
      </>);
      case 'CUSTOMER': return (<>
        <Inp label="Delivery Address" icon="mapPin" value={form.delivery_address} onChange={e=>setForm({...form,delivery_address:e.target.value})} required/>
        <div className="grid grid-cols-2 gap-3">
          <Inp label="Date of Birth" icon="clock" type="date" value={form.date_of_birth} onChange={e=>setForm({...form,date_of_birth:e.target.value})}/>
          <Sel label="Gender" icon="user" value={form.gender} onChange={e=>setForm({...form,gender:e.target.value})} options={[{value:'',label:'Select...'},{value:'male',label:'Male'},{value:'female',label:'Female'},{value:'other',label:'Other'}]}/>
        </div>
      </>);
    }
  };

  return (
    <div className="min-h-screen bg-grid py-10 px-4 sc-bg">
      <div className="max-w-2xl mx-auto animate-scale-in">
        <div className="text-center mb-8">
          <div className="inline-flex p-4 bg-gradient-to-br from-teal-500 to-emerald-600 rounded-2xl mb-4 shadow-2xl shadow-teal-500/25">
            <I name="shield" size={32} className="text-white"/>
          </div>
          <h1 className="font-display text-3xl font-bold text-white mb-2">Create Account</h1>
          <p className="text-slate-500 text-sm">Join the blockchain supply chain network</p>
        </div>
        <form onSubmit={submit} className="glass rounded-2xl p-7 space-y-5">
          {error&&<div className="bg-rose-500/10 border border-rose-500/30 rounded-xl p-3 flex items-center gap-2 text-rose-400 text-sm"><I name="alert" size={16}/>{error}</div>}

          {step===1&&(
            <div className="space-y-5 animate-slide-up">
              <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider block">Select Your Role</label>
              <div className="grid grid-cols-2 gap-3">
                {roles.map(r=>(
                  <div key={r.id} onClick={()=>setRole(r.id)}
                    className={`role-card glass-card rounded-xl p-4 border-2 ${role===r.id?'selected border-teal-500/50':'border-transparent'}`}>
                    <div className={`p-2 rounded-lg bg-${r.color}-500/15 text-${r.color}-400 w-fit mb-2`}><I name={r.icon} size={18}/></div>
                    <h3 className="font-semibold text-white text-sm">{r.label}</h3>
                    <p className="text-[10px] text-slate-600 mt-0.5">{r.description}</p>
                  </div>
                ))}
              </div>
              <Btn onClick={()=>setStep(2)} className="w-full">Continue</Btn>
            </div>
          )}

          {step===2&&(
            <div className="space-y-4 animate-slide-up">
              <div className="flex items-center gap-2 mb-2">
                <button type="button" onClick={()=>{setError('');setStep(1);}} className="text-slate-500 hover:text-white text-sm">← Back</button>
                <span className="text-[10px] text-slate-600">Step 2 of 3</span>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <Inp label="Full Name" icon="user" value={form.full_name} onChange={e=>setForm({...form,full_name:e.target.value})} required/>
                <Inp label="Phone" icon="phone" type="tel" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} required/>
              </div>
              <Inp label="Email" icon="mail" type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} required/>
              <Inp label="CNIC" icon="idCard" value={form.cnic} onChange={e=>setForm({...form,cnic:e.target.value})} placeholder="35202-1234567-8" required/>
              <Inp label="Password" icon="lock" type="password" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} required/>
              <Btn onClick={goStep3} className="w-full">Continue</Btn>
            </div>
          )}

          {step===3&&(
            <div className="space-y-4 animate-slide-up">
              <div className="flex items-center gap-2 mb-2">
                <button type="button" onClick={()=>{setError('');setStep(2);}} className="text-slate-500 hover:text-white text-sm">← Back</button>
                <span className="text-[10px] text-slate-600">Step 3 of 3</span>
              </div>
              <div className="p-2.5 rounded-xl bg-teal-500/10 border border-teal-500/20">
                <p className="text-xs text-teal-400 font-medium">{ROLE_CFG[role].label} Profile</p>
              </div>
              {roleFields()}
              <Btn type="submit" loading={loading} className="w-full">Create Account</Btn>
            </div>
          )}

          <p className="text-center text-xs text-slate-600">
            Already have an account?{' '}
            <button type="button" onClick={onSwitch} className="text-teal-400 hover:text-teal-300 font-semibold">Sign in</button>
          </p>
        </form>
      </div>
    </div>
  );
};

// ─── MANUFACTURER DASHBOARD ─────────────────────────────────────────────────
const MfgDash = ({user}) => {
  const toast = useToast();
  const [products,setProducts] = useState([]);
  const [sel,setSel] = useState(null);
  const [showCreate,setShowCreate] = useState(false);
  const [loading,setLd] = useState(true);
  const [stats,setStats] = useState({total:0,mfg:0,shipped:0,received:0});

  const load = async()=>{
    try {
      const r = await api.myProducts(user.userId||user.user_id);
      const my = Array.from(new Map((r.products||[]).map(p=>[p.product_id||p.productId, p])).values());
      setProducts(my);
      setStats({total:my.length,
        mfg:my.filter(p=>(p.current_status||p.currentStatus)==='MANUFACTURED').length,
        shipped:my.filter(p=>(p.current_status||p.currentStatus)==='SHIPPED_TO_DISTRIBUTOR').length,
        received:my.filter(p=>['RECEIVED_BY_DISTRIBUTOR','SHIPPED_TO_RETAILER','RECEIVED_BY_RETAILER','SOLD_TO_CUSTOMER'].includes(p.current_status||p.currentStatus)).length
      });
    } catch(e){console.error(e);} finally{setLd(false);}
  };
  useEffect(()=>{load();},[]);

  const handleCreate = async(e)=>{
    e.preventDefault(); const f=e.target;
    try {
      const r = await api.create({name:f.name.value,category:f.category.value,description:f.description.value,metadata:{weight:f.weight.value,color:f.color.value,location:f.location.value}});
      if(r.success){setShowCreate(false);f.reset();load();toast.success('Product created!');}
    } catch(err){toast.error(err.message);}
  };

  return (
    <div className="space-y-5 animate-fade-in">
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
        <Stat title="Total" value={stats.total} icon="package" color="teal"/>
        <Stat title="Mfg" value={stats.mfg} icon="factory" color="teal"/>
        <Stat title="Shipped" value={stats.shipped} icon="truck" color="amber"/>
        <Stat title="Retail" value={stats.received} icon="box" color="emerald"/>
      </div>
      <div className="flex justify-between items-center px-1">
        <h2 className="text-lg font-display font-bold text-white">My Products</h2>
        <Btn onClick={()=>setShowCreate(true)} icon={<I name="plus" size={14}/>} className="scale-90 md:scale-100">Create</Btn>
      </div>
      {loading?<div className="text-center py-10"><I name="loader" size={28} className="text-slate-600"/></div>:(
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 md:gap-4">
          {products.map(p=><ProductCard key={p.product_id||p.productId} product={p} userRole="MANUFACTURER" onClick={setSel} showActions/>)}
        </div>
      )}
      {products.length===0&&!loading&&(
        <div className="text-center py-10 glass-card rounded-2xl">
          <I name="package" size={40} className="text-slate-700 mx-auto mb-3"/>
          <p className="text-slate-600 text-sm">No products yet. Create your first!</p>
        </div>
      )}
      {showCreate&&(
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm" onClick={()=>setShowCreate(false)}>
          <div className="glass rounded-2xl w-full max-w-lg animate-scale-in" onClick={e=>e.stopPropagation()}>
            <div className="p-5 border-b border-white/5 flex justify-between items-center">
              <h2 className="text-lg font-display font-bold text-white">Create Product</h2>
              <button onClick={()=>setShowCreate(false)} className="text-slate-500 hover:text-white"><I name="x" size={18}/></button>
            </div>
            <form onSubmit={handleCreate} className="p-5 space-y-3">
              <Inp name="name" label="Product Name" icon="box" placeholder="iPhone 15 Pro" required/>
              <div className="grid grid-cols-2 gap-3">
                <Inp name="category" label="Category" icon="box" placeholder="Electronics" required/>
                <Inp name="description" label="Description" icon="box" placeholder="Premium device"/>
              </div>
              <div className="grid grid-cols-3 gap-3">
                <Inp name="weight" label="Weight" icon="box" placeholder="200g"/>
                <Inp name="color" label="Color" icon="box" placeholder="Black"/>
                <Inp name="location" label="Location" icon="mapPin" placeholder="Karachi" required/>
              </div>
              <div className="flex gap-3 pt-1">
                <Btn type="button" variant="secondary" onClick={()=>setShowCreate(false)} className="flex-1">Cancel</Btn>
                <Btn type="submit" className="flex-1">Create</Btn>
              </div>
            </form>
          </div>
        </div>
      )}
      {sel&&<DetailModal product={sel} userRole="MANUFACTURER" onClose={()=>setSel(null)} onUpdate={load}/>}
    </div>
  );
};

// ─── DISTRIBUTOR DASHBOARD ──────────────────────────────────────────────────
const DistDash = ({user}) => {
  const [products,setProducts] = useState([]);
  const [sel,setSel] = useState(null);
  const [loading,setLd] = useState(true);
  const [searchId,setSearchId] = useState('');
  const toast = useToast();

  const load = async()=>{
    try {
      const r = await api.myProducts(user.userId||user.user_id);
      setProducts(Array.from(new Map((r.products||[]).map(p=>[p.product_id||p.productId, p])).values()));
    } catch(e){console.error(e);} finally{setLd(false);}
  };
  useEffect(()=>{load();},[]);

  const search = async(e)=>{
    e.preventDefault();
    try { const r=await api.product(searchId); setSel(r.success?r.product:r); }
    catch(err){toast.error('Not found: '+err.message);}
  };

  const incoming = products.filter(p=>p.current_status==='SHIPPED_TO_DISTRIBUTOR');
  const warehouse = products.filter(p=>p.current_status==='RECEIVED_BY_DISTRIBUTOR');
  const shipped = products.filter(p=>['SHIPPED_TO_RETAILER','RECEIVED_BY_RETAILER','SOLD_TO_CUSTOMER'].includes(p.current_status));

  return (
    <div className="space-y-5 animate-fade-in">
      <div className="grid grid-cols-2 md:grid-cols-3 gap-3 md:gap-4">
        <Stat title="Incoming" value={incoming.length} icon="truck" color="amber"/>
        <Stat title="Warehouse" value={warehouse.length} icon="box" color="teal"/>
        <Stat title="Shipped" value={shipped.length} icon="transfer" color="emerald"/>
      </div>
      <form onSubmit={search} className="flex gap-2">
        <Inp value={searchId} onChange={e=>setSearchId(e.target.value)} placeholder="Search ID..." className="flex-1"/>
        <Btn type="submit" icon={<I name="search" size={14}/>} className="px-4">Search</Btn>
      </form>
      {[{title:'Incoming',items:incoming,dot:'bg-amber-500'},
        {title:'Inventory',items:warehouse,dot:'bg-teal-500'},
        {title:'Shipped',items:shipped,dot:'bg-emerald-500'}
      ].map(sec=>sec.items.length>0&&(
        <div key={sec.title}>
          <h3 className="text-xs font-semibold text-white mb-3 flex items-center gap-2 px-1">
            <span className={`w-2 h-2 rounded-full ${sec.dot}`}></span>{sec.title} ({sec.items.length})
          </h3>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 md:gap-4">
            {sec.items.map(p=><ProductCard key={p.product_id||p.productId} product={p} userRole="DISTRIBUTOR" onClick={setSel} showActions/>)}
          </div>
        </div>
      ))}
      {products.length===0&&!loading&&(
        <div className="text-center py-10 glass-card rounded-2xl">
          <I name="truck" size={40} className="text-slate-700 mx-auto mb-3"/>
          <p className="text-slate-600 text-sm">No products at your stage. Search by ID or wait for shipments.</p>
        </div>
      )}
      {sel&&<DetailModal product={sel} userRole="DISTRIBUTOR" onClose={()=>setSel(null)} onUpdate={load}/>}
    </div>
  );
};

// ─── CUSTOMER DASHBOARD ─────────────────────────────────────────────────────
const CustDash = ({user}) => {
  const [searchId,setSearchId] = useState('');
  const [product,setProduct] = useState(null);
  const [loading,setLd] = useState(false);
  const [error,setError] = useState('');
  const [purchases,setPurchases] = useState([]);
  const toast = useToast();

  useEffect(()=>{
    api.myProducts(user.userId||user.user_id).then(r=>setPurchases(Array.from(new Map((r.products||[]).map(p=>[p.product_id||p.productId, p])).values()))).catch(()=>{});
  },[]);

  const search = async(e, idOverride)=>{
    if(e) e.preventDefault(); 
    setLd(true); setError('');
    const id = idOverride || searchId;
    try {
      const r = await api.verify(id);
      console.log('Verify Result:', r);
      if(r.success){setProduct({...r.blockchain,history:r.history,isAuthentic:r.isAuthentic,metadata:r.database?.metadata||{}});toast.success('Product verified!');}
      else setError('Product not found');

        </div>

        <p className="text-slate-500 text-sm">Enter a product ID to check its blockchain history</p>
      </div>
      <form onSubmit={search} className="flex gap-3">
        <Inp value={searchId} onChange={e=>setSearchId(e.target.value)} placeholder="Enter Product ID..." className="flex-1" icon="search"/>
        <Btn type="submit" loading={loading}>Verify</Btn>
      </form>
      {error&&<div className="bg-rose-500/10 border border-rose-500/30 rounded-xl p-3 flex items-center gap-2 text-rose-400 text-sm"><I name="alert" size={16}/>{error}</div>}
      {product&&(
        <div className="glass rounded-2xl p-6 animate-slide-up">
          <div className="flex items-center justify-between mb-5">

// ─── TAB: TRANSFERS ─────────────────────────────────────────────────────────
const TransfersPage = ({user}) => {
  const [products,setProducts] = useState([]);
  const [sel,setSel] = useState(null);
  const [loading,setLd] = useState(true);
  const load = async()=>{
    try {
      const r=await api.myProducts(user.userId||user.user_id); 
      const all=Array.from(new Map((r.products||[]).map(p=>[p.product_id||p.productId, p])).values());
      const rc=ROLE_CFG[user.role]||ROLE_CFG.MANUFACTURER;
      const canT=(p)=>{const s=p.current_status||p.currentStatus||'MANUFACTURED';return rc.allowed.some(x=>STATUS_FLOW.indexOf(x)>STATUS_FLOW.indexOf(s));};
      
      // For Transfers, you must currently own the product.
      let f=all.filter(p=>p.current_owner_id?.toString()===(user.userId||user.user_id)&&canT(p));
      setProducts(f);
    } catch(e){console.error(e);} finally{setLd(false);}
  };
  useEffect(()=>{load();},[]);
  return (
    <div className="space-y-5 animate-fade-in">
      <div><h2 className="text-lg font-display font-bold text-white">Transfers</h2><p className="text-xs text-slate-600 mt-0.5">Products available for transfer</p></div>
      {loading?<div className="text-center py-10"><I name="loader" size={28} className="text-slate-600"/></div>:(
        <div className="grid grid-cols-3 gap-3">{products.map(p=><ProductCard key={p.product_id||p.productId} product={p} userRole={user.role} onClick={setSel} showActions/>)}</div>
      )}
      {products.length===0&&!loading&&<div className="text-center py-10 glass-card rounded-2xl"><I name="transfer" size={40} className="text-slate-700 mx-auto mb-3"/><p className="text-slate-600 text-sm">No products available for transfer.</p></div>}
      {sel&&<DetailModal product={sel} userRole={user.role} onClose={()=>setSel(null)} onUpdate={load}/>}
    </div>
  );
};

  const [events,setEvents] = useState([]);

          </h4>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
