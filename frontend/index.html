// ─── QR SCANNER PAGE ────────────────────────────────────────────────────────
const ScannerPage = ({user}) => {
  const toast = useToast();
  const [scanning,setScanning] = useState(false);
  const [result,setResult] = useState(null);
  const [product,setProduct] = useState(null);
  const [loading,setLd] = useState(false);
  const [error,setError] = useState('');
  const videoRef = useRef(null);
  const fileInputRef = useRef(null);
  const scanLoopRef = useRef(null);

  useEffect(() => {
    return () => { stopScan(); };
  }, []);

  const tick = async () => {
    if (!videoRef.current || !videoRef.current.srcObject) return;
    
    if (videoRef.current.readyState === videoRef.current.HAVE_ENOUGH_DATA) {
      // Hardware accelerated native detection (Google Lens backend)
      if (window.BarcodeDetector) {
        try {
          if (!window.barcodeDetectorInst) {
            window.barcodeDetectorInst = new window.BarcodeDetector({ formats: ['qr_code'] });
          }
          const barcodes = await window.barcodeDetectorInst.detect(videoRef.current);
          if (barcodes.length > 0) {
            stopScan();
            handleScan(barcodes[0].rawValue);
            return;
          }
        } catch (e) { /* ignore and fallback */ }
      }

      // Fallback to jsQR
      const canvas = document.createElement('canvas');
      canvas.width = videoRef.current.videoWidth;
      canvas.height = videoRef.current.videoHeight;
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(videoRef.current, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      
      // Attempt to read
      let code = window.jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
      
      if (code) {
        stopScan();
        handleScan(code.data);
        return;
      }
    }
    scanLoopRef.current = requestAnimationFrame(tick);
  };

  const startScan = () => {
    setScanning(true); setResult(null); setProduct(null); setError('');
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function(stream) {
        if (!videoRef.current) return;
        videoRef.current.srcObject = stream;
        videoRef.current.setAttribute("playsinline", true);
        videoRef.current.play();
        scanLoopRef.current = requestAnimationFrame(tick);
      }).catch(err => {
        setError('Camera access denied or unavailable. Please upload an image.');
        setScanning(false);
      });
    } else {
      setError('Camera not supported by this browser. Please upload an image.');
      setScanning(false);
    }
  };

  const stopScan = () => {
    if (scanLoopRef.current) cancelAnimationFrame(scanLoopRef.current);
    if (videoRef.current && videoRef.current.srcObject) {
      videoRef.current.srcObject.getTracks().forEach(t => t.stop());
      videoRef.current.srcObject = null;
    }
    setScanning(false);
  };

  const handleFileUpload = (e) => {
    const file = e.target.files?.[0];
    if(!file) return;
    setScanning(false); setResult(null); setProduct(null); setError(''); setLd(true);
    stopScan();
    
    const reader = new FileReader();
    reader.onload = (event) => {
      const img = new Image();
      img.onload = async () => {
        // Pass 1: Native BarcodeDetector (Google Lens Engine - handles white borders effortlessly)
        if (window.BarcodeDetector) {
          try {
            if (!window.barcodeDetectorInst) {
              window.barcodeDetectorInst = new window.BarcodeDetector({ formats: ['qr_code'] });
            }
            const barcodes = await window.barcodeDetectorInst.detect(img);
            if (barcodes.length > 0) {
              handleScan(barcodes[0].rawValue);
              return;
            }
          } catch (e) { /* fallback if native fails */ }
        }

        // Pass 2: jsQR on Full Resolution (handles massive white borders for older browsers)
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0, img.width, img.height);
        let imgData = ctx.getImageData(0, 0, img.width, img.height);
        
        let code = window.jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: "dontInvert" });
        if (!code) code = window.jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: "invertFirst" });
        
        if (code) {
          handleScan(code.data);
          return;
        }

        // Pass 3: jsQR on Scaled Down Image (destroys moiré interference patterns from screens)
        let w = img.width;
        let h = img.height;
        if (w > 1000) {
            h = Math.floor(h * (1000 / w));
            w = 1000;
            canvas.width = w;
            canvas.height = h;
            // Clear and redraw scaled
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, w, h);
            imgData = ctx.getImageData(0, 0, w, h);
            
            code = window.jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: "dontInvert" });
            if (!code) code = window.jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: "invertFirst" });
            
            if (code) {
              handleScan(code.data);
              return;
            }
        }

        // Failed all 3 passes
        setError('No QR code found. Try cropping out white borders or ensure the code is clear.');
        setLd(false);
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  };

  const handleScan = async(text) => {
    setResult(text); setLd(true); setError('');
    
    // Robustly extract the UUID from the scanned text (whether it's a URL, JSON, or raw string)
    let pid = text.trim();
    const uuidMatch = text.match(/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}/);
    if (uuidMatch) {
      pid = uuidMatch[0];
    }

    try {
      const r = await api.verify(pid);
      if(r.success) {
        setProduct({...r.blockchain,history:r.history,isAuthentic:r.isAuthentic});
        toast.success('Product verified from QR!');
      } else { setError('Product not found for scanned code'); }
    } catch(err) { setError('Could not verify: '+err.message); }
    finally { setLd(false); }
  };

  const handleManual = async(e) => {
    e.preventDefault();
    const id = e.target.manualId.value.trim();
    if(id) handleScan(id);
  };

  return (
    <div className="max-w-3xl mx-auto space-y-5 animate-fade-in">
      <input type="file" ref={fileInputRef} onChange={handleFileUpload} accept="image/*" className="hidden" />

      <div className="text-center mb-4">
        <div className="inline-flex p-4 bg-gradient-to-br from-teal-500 to-amber-600 rounded-2xl mb-4 shadow-2xl shadow-teal-500/20">
          <I name="qr" size={32} className="text-white"/>
        </div>
        <h2 className="font-display text-2xl font-bold text-white mb-1">QR Code Scanner</h2>
        <p className="text-slate-500 text-sm">Scan a product QR code to verify authenticity</p>
      </div>

      {!scanning && !product && (
        <div className="glass rounded-2xl p-8 text-center space-y-5">
          <div className="w-48 h-48 mx-auto rounded-2xl border-2 border-dashed border-teal-500/30 flex items-center justify-center bg-teal-500/5">
            <I name="qr" size={64} className="text-teal-500/30"/>
          </div>
          <div className="flex gap-3 justify-center max-w-sm mx-auto">
            <Btn onClick={startScan} icon={<I name="eye" size={16}/>} className="flex-1">Camera</Btn>
            <Btn onClick={()=>fileInputRef.current?.click()} variant="gold" icon={<I name="box" size={16}/>} className="flex-1">Upload Photo</Btn>
          </div>
          <div className="relative py-3">
            <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-white/5"></div></div>
            <div className="relative flex justify-center"><span className="bg-[#04090f] px-4 text-xs text-slate-600">or enter manually</span></div>
          </div>
          <form onSubmit={handleManual} className="flex gap-3 max-w-md mx-auto">
            <Inp name="manualId" placeholder="Paste Product ID..." className="flex-1" icon="hash"/>
            <Btn type="submit" variant="secondary">Verify</Btn>
          </form>
        </div>
      )}

      {scanning && (
        <div className="glass rounded-2xl p-5 space-y-4">
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-2">
              <span className="status-dot dot-online"></span>
              <span className="text-xs text-teal-400 font-semibold">Camera Active</span>
            </div>
            <Btn onClick={stopScan} variant="danger" className="text-xs px-3 py-1.5">Stop</Btn>
          </div>
          <div className="rounded-2xl overflow-hidden relative w-[300px] h-[300px] mx-auto bg-[#020617] shadow-[inset_0_4px_30px_rgba(0,0,0,0.5)]">
            <video ref={videoRef} className="absolute inset-0 w-full h-full object-cover"></video>
            <div className="absolute inset-6 pointer-events-none">
              <div className="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-teal-400 rounded-tl-xl shadow-[0_0_10px_rgba(45,212,191,0.5)]"></div>
              <div className="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-teal-400 rounded-tr-xl shadow-[0_0_10px_rgba(45,212,191,0.5)]"></div>
              <div className="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-teal-400 rounded-bl-xl shadow-[0_0_10px_rgba(45,212,191,0.5)]"></div>
              <div className="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-teal-400 rounded-br-xl shadow-[0_0_10px_rgba(45,212,191,0.5)]"></div>
              <div className="absolute left-0 right-0 h-0.5 bg-teal-400 shadow-[0_0_12px_rgba(45,212,191,1)] animate-scan-line z-10"></div>
            </div>
            <div className="absolute inset-0 bg-teal-500/10 pointer-events-none mix-blend-overlay"></div>
          </div>
          <p className="text-center text-[10px] text-slate-600">Point your camera at a product QR code</p>
        </div>
      )}

      {error && (
        <div className="bg-rose-500/10 border border-rose-500/30 rounded-xl p-3 flex items-center gap-2 text-rose-400 text-sm">
          <I name="alert" size={16}/>{error}
        </div>
      )}

      {loading && (
        <div className="text-center py-8"><I name="loader" size={28} className="text-teal-400"/><p className="text-sm text-slate-500 mt-2">Verifying on blockchain...</p></div>
      )}

      {product && (
        <div className="glass rounded-2xl p-6 animate-slide-up space-y-5">
          <div className="flex items-center justify-between">
            <div>
              <div className="flex items-center gap-2 mb-1">
                <div className="p-1.5 rounded-lg bg-emerald-500/15"><I name="check" size={18} className="text-emerald-400"/></div>
                <h3 className="text-xl font-display font-bold text-white">{product.name}</h3>
              </div>
              <p className="text-slate-600 font-mono text-xs">{product.product_id||product.productId}</p>
            </div>
            <StatusBadge status={product.current_status||product.currentStatus} size="lg"/>
          </div>

          <div className="bg-emerald-500/10 border border-emerald-500/20 rounded-xl p-3 flex items-center gap-2">
            <I name="shield" size={16} className="text-emerald-400"/>
            <span className="text-sm text-emerald-300 font-semibold">Blockchain Verified — Authentic Product</span>
          </div>

          <Pipeline currentStatus={product.current_status||product.currentStatus}/>

          <div className="grid grid-cols-3 gap-3">
            <div className="glass-card rounded-xl p-3 text-center">
              <I name="factory" size={18} className="text-teal-400 mx-auto mb-1"/>
              <p className="text-[10px] text-slate-600">Manufacturer</p>
              <p className="text-xs font-semibold text-white">{product.manufacturer||product.manufacturer_org}</p>
            </div>
            <div className="glass-card rounded-xl p-3 text-center">
              <I name="store" size={18} className="text-amber-400 mx-auto mb-1"/>
              <p className="text-[10px] text-slate-600">Current Owner</p>
              <p className="text-xs font-semibold text-white">{product.current_owner_org||product.currentOwner}</p>
            </div>
            <div className="glass-card rounded-xl p-3 text-center">
              <I name="check" size={18} className="text-emerald-400 mx-auto mb-1"/>
              <p className="text-[10px] text-slate-600">Authenticity</p>
              <p className="text-xs font-semibold text-emerald-400">Verified ✓</p>
            </div>
          </div>

          <div className="border-t border-white/5 pt-4">
            <h4 className="text-sm font-semibold text-white mb-3 flex items-center gap-1.5"><I name="history" size={14}/>Supply Chain Journey</h4>
            <Timeline history={product.history||[]} currentStatus={product.current_status||product.currentStatus}/>
          </div>

          <div className="flex gap-3">
            <Btn onClick={()=>{setProduct(null);setResult(null);}} variant="secondary" icon={<I name="refresh" size={14}/>} className="flex-1">Scan Another</Btn>
            <Btn onClick={startScan} icon={<I name="eye" size={14}/>} className="flex-1">Open Camera</Btn>
          </div>
        </div>
      )}

      {result && !loading && !product && !error && (
        <div className="glass-card rounded-xl p-3 text-center">
          <p className="text-[10px] text-slate-600">Scanned: <span className="font-mono text-teal-400">{result}</span></p>
        </div>
      )}
    </div>
  );
};

// ─── DASHBOARD LAYOUT ───────────────────────────────────────────────────────
const TopBar = ({title,user,onProfile}) => {
  const [health,setHealth] = useState(null);
  useEffect(()=>{
    const check = () => fetch(`${API_BASE.replace('/api','')}/health`,{headers:{'ngrok-skip-browser-warning':'1'}}).then(r=>r.json()).catch(()=>null).then(setHealth);
    check(); const iv=setInterval(check,30000);
    return ()=>clearInterval(iv);
  },[]);

  return (
    <header className="flex items-center justify-between px-4 md:px-8 py-4 md:py-5 border-b border-white/5 bg-slate-950/20 backdrop-blur-md sticky top-0 z-30">
      <div className="min-w-0">
        <div className="flex items-center gap-2">
          <h2 className="text-lg md:text-xl font-display font-bold text-white tracking-tight truncate">{title}</h2>
          <div className="flex items-center gap-1.5 px-2 py-0.5 rounded-full bg-slate-900/50 border border-white/5">
            <span className={`status-dot ${health?'dot-online':'dot-offline'}`}></span>
            <span className="text-[8px] font-bold uppercase text-slate-500 hidden sm:inline tracking-tighter">{health?'Online':'Offline'}</span>
          </div>
        </div>
        <div className="flex items-center gap-2 mt-0.5">
          <span className="hidden sm:inline text-[9px] text-slate-500 uppercase font-bold tracking-widest">Workspace</span>
          <span className="hidden sm:inline text-slate-700">/</span>
          <span className="text-[9px] text-teal-500/80 uppercase font-bold tracking-widest truncate">{user.org_name}</span>
        </div>
      </div>
      <div className="flex items-center gap-3 md:gap-4 ml-2">
        <button className="hidden sm:flex p-2.5 rounded-xl bg-white/5 text-slate-400 hover:text-white transition-colors relative">
          <I name="bell" size={18}/>
          <span className="absolute top-2 right-2.5 w-2 h-2 bg-rose-500 rounded-full border-2 border-[#0f172a]"></span>
        </button>
        <div onClick={onProfile} className="flex items-center gap-3 sm:pl-4 sm:border-l border-white/5 cursor-pointer group">
          <div className="hidden md:block text-right">
            <p className="text-sm font-bold text-white group-hover:text-teal-400 transition-colors">{user.full_name}</p>
            <p className="text-[10px] text-slate-500 font-medium">{user.role}</p>
          </div>
          <div className="w-9 h-9 md:w-10 md:h-10 rounded-lg md:rounded-xl bg-gradient-to-br from-slate-800 to-slate-900 border border-white/10 flex items-center justify-center text-teal-400 group-hover:border-teal-500/30 transition-all shadow-xl">
            <I name="user" size={18}/>
          </div>
        </div>
      </div>
    </header>
  );
};

const BottomNav = ({activeTab,onTabChange,user}) => {
  const items = [
    {id:'dashboard',label:'Home',icon:'chart'},
    {id:'products',label:'Inv',icon:'package'},
    {id:'scanner',label:'Scan',icon:'qr'},
    {id:'about',label:'About',icon:'globe'},
    {id:'settings',label:'Set',icon:'settings'},
  ];
  return (
    <nav className="lg:hidden fixed bottom-0 left-0 right-0 bg-slate-950/80 backdrop-blur-xl border-t border-white/5 flex justify-around items-center px-2 py-3 z-[100] pb-safe">
      {items.map(t=>(
        <button key={t.id} onClick={()=>onTabChange(t.id)}
          className={`flex flex-col items-center gap-1 flex-1 transition-all ${activeTab===t.id?'text-teal-400':'text-slate-500'}`}>
          <div className={`p-1.5 rounded-lg ${activeTab===t.id?'bg-teal-500/10':''}`}><I name={t.icon} size={20}/></div>
          <span className="text-[10px] font-bold uppercase tracking-tighter">{t.label}</span>
        </button>
      ))}
    </nav>
  );
};

const DashLayout = ({user}) => {
  const [tab,setTab] = useState('dashboard');
  const [showProfile,setShowProfile] = useState(false);

  const getTitle = () => {
    const item = [
      {id:'dashboard',label:'Command Center'},
      {id:'products',label:'Product Inventory'},
      {id:'transfers',label:'Logistics & Transfers'},
      {id:'history',label:'Audit Trail'},
      {id:'verify',label:'Product Verification'},
      {id:'scanner',label:'High-Speed QR Scanner'},
      {id:'benchmarks',label:'System Performance'},
      {id:'settings',label:'User Settings'}
    ].find(x=>x.id===tab);
    return item?.label || 'Dashboard';
  };

  const content = () => {
    switch(tab){
      case 'dashboard':
        switch(user.role){
          case 'MANUFACTURER': return <MfgDash user={user}/>;
          case 'DISTRIBUTOR': return <DistDash user={user}/>;
          case 'RETAILER': return <RetailDash user={user}/>;
          case 'CUSTOMER': return <CustDash user={user}/>;
          default: return <MfgDash user={user}/>;
        }
      case 'products': return <ProductsPage user={user}/>;
      case 'transfers': return <TransfersPage user={user}/>;
      case 'history': return <HistoryPage user={user}/>;
      case 'verify': return <CustDash user={user}/>;
      case 'scanner': return <ScannerPage user={user}/>;
      case 'benchmarks': return <BenchPage/>;
      case 'about': return <AboutPage/>;
      case 'settings': return <SettingsPage user={user}/>;
      default: return <MfgDash user={user}/>;
    }
  };

  return (
    <div className="flex min-h-screen sc-bg font-sans selection:bg-teal-500/30">
      <Sidebar user={user} activeTab={tab} onTabChange={setTab} onProfileClick={()=>setShowProfile(true)}/>
      <div className="flex-1 flex flex-col min-w-0 pb-20 lg:pb-0">
        <TopBar title={getTitle()} user={user} onProfile={()=>setShowProfile(true)}/>
        <main className="flex-1 p-4 md:p-8 overflow-y-auto custom-scrollbar">
          <div className="max-w-[1400px] mx-auto">
            {content()}
          </div>
        </main>
      </div>
      <BottomNav activeTab={tab} onTabChange={setTab} user={user}/>
      {showProfile&&<ProfileModal user={user} onClose={()=>setShowProfile(false)}/>}
    </div>
  );
};

// ─── APP ROOT ───────────────────────────────────────────────────────────────
const App = () => {
  const {user,loading} = useAuth();
  const [page,setPage] = useState('login');

  if(loading) return (
    <div className="min-h-screen flex items-center justify-center sc-bg">
      <div className="text-center animate-fade-in">
        <div className="inline-flex p-4 bg-gradient-to-br from-teal-500 to-emerald-600 rounded-2xl mb-4 shadow-2xl shadow-teal-500/25">
          <I name="shield" size={32} className="text-white"/>
        </div>
        <div className="flex items-center gap-2 justify-center mt-3">
          <I name="loader" size={16} className="text-teal-400"/>
          <p className="text-sm text-slate-500">Loading...</p>
        </div>
      </div>
    </div>
  );

  if(user) return <DashLayout user={user}/>;
  if(page==='signup') return <SignupPage onSwitch={()=>setPage('login')}/>;
  return <LoginPage onSwitch={()=>setPage('signup')}/>;
};

// ─── RENDER ─────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(
  <ToastProvider><AuthProvider><App/></AuthProvider></ToastProvider>
);
</script>
</body>
</html>
